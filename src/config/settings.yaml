config_version: 2
models:
  embedding:
    provider: dashscope
    model: text-embedding-v3
  router:
    enabled: true
    strategy: priority
    strategy_template: custom
    candidates: []
    deployment_targets: []
    rollout:
      enabled: true
      owner_only: true
      channels: []
    complexity_routing:
      enabled: false
      simple_prefer_cost: true
      complex_prefer_success_rate: true
    budget:
      enabled: false
      window_seconds: 60
      max_calls: 120
      max_cost_usd: 2.0
      estimated_input_tokens_per_char: 0.25
      provider_cost_per_1k_tokens: {}
    outlier_ejection:
      enabled: true
      failure_threshold: 3
      cooldown_seconds: 30
    deployment_orchestrator:
      enabled: false
      mode: manual
      target_ids: []
      active_target: ''
      standby_targets: []
      weights: {}
      canary:
        enabled: false
        target: ''
        weight: 0.1
      auto_failover:
        enabled: true
        cooldown_seconds: 30
        auto_rollback: true
  prompt_cache:
    enabled: false
    ttl_seconds: 300
    max_items: 512
    segment_policy: stable_prefix
    scope_fields:
    - session_key
    - channel
    - sender_id
    sanitize_sensitive: true
  deployment_profiles:
    openai:
      capacity_rpm: 120
      cost_tier: high
      latency_target_ms: 1800
    dashscope:
      capacity_rpm: 180
      cost_tier: medium
      latency_target_ms: 2200
    deepseek:
      capacity_rpm: 120
      cost_tier: medium
      latency_target_ms: 2000
    ollama_local:
      capacity_rpm: 600
      cost_tier: low
      latency_target_ms: 3500
wake_word:
  enabled: true
  keyword: gazer
  sensitivity: 0.5
personality:
  name: Gazer
  trust_level: 0.5
  drives:
  - be_helpful
  - be_truthful
  - protect_user_safety
  goals:
  - deliver_reliable_task_results
  - reduce_tool_failures
  mental_process:
    initial_state: IDLE
    states:
    - name: IDLE
      description: Waiting, silently observing
    - name: INTERACTING
      description: Actively conversing
    - name: THINKING
      description: Deep thought / reflection
    on_input_transition:
      IDLE: INTERACTING
      THINKING: INTERACTING
  runtime:
    enabled: true
    signals:
      enabled: true
      warning_score: 0.82
      critical_score: 0.7
      retain: 500
    auto_correction:
      enabled: false
      strategy: rewrite
      trigger_levels:
      - critical
    tool_tier_guard:
      enabled: true
      trigger_levels:
      - warning
      - critical
      high_risk_levels:
      - critical
      downgrade_to: safe
      downgrade_by_level:
        critical: safe
      window_seconds: 1800
      sources:
      - agent_loop
      - persona_eval
    tool_policy_linkage:
      enabled: true
      trigger_levels:
      - warning
      - critical
      high_risk_levels:
      - critical
      window_seconds: 1800
      sources:
      - persona_eval
      allow_names: []
      deny_names: []
      allow_providers: []
      deny_providers: []
      allow_names_by_level: {}
      deny_names_by_level:
        warning:
        - exec
        - node_invoke
        critical:
        - exec
        - node_invoke
        - delegate_task
        - remote_exec
      allow_providers_by_level: {}
      deny_providers_by_level:
        critical:
        - devices
        - system
        - runtime
    memory_context_guard:
      enabled: true
      trigger_levels:
      - warning
      - critical
      window_seconds: 1800
      sources:
      - agent_loop
      - persona_eval
      warning:
        recent_limit: 12
        entity_limit: 3
        semantic_limit: 3
        max_recall_items: 3
        max_context_chars: 2200
        include_relationship_context: true
        include_time_reminders: true
        include_emotion_context: true
        include_recent_observation: true
      critical:
        recent_limit: 6
        entity_limit: 2
        semantic_limit: 2
        max_recall_items: 2
        max_context_chars: 1200
        include_relationship_context: false
        include_time_reminders: true
        include_emotion_context: true
        include_recent_observation: false
  evolution:
    auto_optimize:
      enabled: false
      min_feedback_total: 6
      min_actionable_feedback: 3
      cooldown_seconds: 1800
    publish_gate:
      enabled: true
      min_similarity: 0.45
      min_length_ratio: 0.5
      max_length_ratio: 2.0
      require_personality_name: true
      respect_release_gate: true
    pre_publish_eval:
      enabled: true
      min_score: 0.55
      block_on_fail: true
      set_release_gate_on_fail: true
    history:
      max_records: 300
voice:
  provider: edge-tts
  voice_id: zh-CN-XiaoxiaoNeural
  rate: +0%
  volume: +0%
  cloud:
    provider: disabled
    provider_ref: ''
    base_url: ''
    api_key: ''
    model: gpt-4o-mini-tts
    strict_required: false
    request_timeout_seconds: 20
    response_format: pcm
    retry_count: 1
    fallback_to_edge: true
visual:
  eye_color:
  - 0
  - 200
  - 255
  blink_interval: 3000
  breathing_speed: 0.02
perception:
  screen_enabled: true
  camera_enabled: false
  camera_device_index: 0
  capture_interval: 60
  satellite_ids: []
  action_enabled: true
  spatial_enabled: false
  spatial:
    provider: local_mediapipe
    route_mode: local_first
    cloud:
      provider: disabled
      provider_ref: ''
      base_url: ''
      api_key: ''
      model: ''
      strict_required: false
      request_timeout_seconds: 15
      poll_interval_seconds: 1.5
      max_calls_per_minute: 20
      estimated_cost_per_call_usd: 0.001
      max_cost_per_minute_usd: 0.03
asr:
  provider: whisper_local
  model_size: base
  input_device: null
  route_mode: local_first
  cloud:
    provider: disabled
    provider_ref: ''
    base_url: ''
    api_key: ''
    model: gpt-4o-mini-transcribe
    strict_required: false
    request_timeout_seconds: 20
    max_calls_per_minute: 20
    estimated_cost_per_call_usd: 0.002
    max_cost_per_minute_usd: 0.05
devices:
  default_target: local-desktop
  local:
    backend: python
  local_node_id: local-desktop
  local_node_label: This Machine
  body_node:
    enabled: true
    node_id: body-main
    label: Physical Body
    allow_connect_control: true
  satellite:
    enabled: true
    invoke_timeout_seconds: 15
    nodes: {}
    default_allow_actions:
    - screen.observe
    - screen.screenshot
    - input.mouse.click
    - input.keyboard.type
    - input.keyboard.hotkey
    - file.send
satellite:
  transport_backend: python
  max_pending_requests_per_node: 64
  pending_ttl_seconds: 30.0
  heartbeat_timeout_seconds: 45.0
  frame_window_seconds: 2.0
  max_frame_bytes_per_window: 4194304
coding:
  exec_backend: local
  max_output_chars: 100000
  max_parallel_tool_calls: 4
  allow_local_fallback: false
  ssh:
    enabled: false
    host: ''
    user: ''
    port: 22
    identity_file: ''
    strict_host_key_checking: true
    remote_workspace: .
runtime:
  backend: python
  rust_sidecar:
    endpoint: ''
    timeout_ms: 3000
    auto_fallback_on_error: true
    error_fallback_threshold: 3
    rollout:
      enabled: false
      owner_only: false
      channels: []
feishu:
  enabled: false
  app_id: ''
  app_secret: ''
  allowed_ids: []
  simulated_typing:
    enabled: false
    text: 正在思考中...
    min_interval_seconds: 8
    auto_recall_on_reply: true
  media_analysis:
    enabled: true
    include_inbound_summary: true
    analyze_images: true
    transcribe_audio: true
    analyze_video_keyframe: true
    timeout_seconds: 12
    audio_whisper_model: base
telegram:
  enabled: true
  token: ''
  allowed_ids: []
  dm_policy: pairing
discord:
  enabled: false
  token: ''
  allowed_guild_ids: []
  dm_policy: pairing
web:
  search:
    brave_api_key: ''
    perplexity_api_key: ''
    perplexity_base_url: https://api.perplexity.ai
    perplexity_model: sonar
    primary_provider: brave
    primary_only: false
    report_file: data/reports/web_search_observations.jsonl
