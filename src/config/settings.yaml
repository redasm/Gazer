      enabled: true
      min_score: 0.25
      allow_low_relevance_fallback: true
    providers_order:
    - brave
    - duckduckgo
    - wikipedia
    - bing_rss
    providers_enabled:
      brave: true
      perplexity: false
      duckduckgo: true
      bing_rss: true
      wikipedia: true
    scenario_routing:
      enabled: true
      auto_detect: true
      profiles:
        general:
        - brave
        - duckduckgo
        - wikipedia
        - bing_rss
        news:
        - brave
        - duckduckgo
        - bing_rss
        - wikipedia
        reference:
        - wikipedia
        - duckduckgo
        - brave
        - bing_rss
        tech:
        - duckduckgo
        - brave
        - wikipedia
        - bing_rss
memory:
  context_backend:
    enabled: false
    mode: openviking
    data_dir: data/openviking
    config_file: ''
    session_prefix: gazer
    default_user: owner
    commit_every_messages: 8
  tool_result_persistence:
    enabled: true
    mode: allowlist
    allow_tools:
    - web_search
    - web_fetch
    - web_report
    - read_file
    - grep
    - find_files
    - list_dir
    - email_read
    - email_search
    - vision_query
    deny_tools:
    - exec
    - write_file
    - edit_file
    - node_invoke
    - gui_task_execute
    - git_commit
    - git_push
    - email_send
    - hardware_control
    - delegate_task
    persist_on_error: false
    min_result_chars: 16
    max_result_chars: 1200
api:
  cors_origins:
  - http://localhost:5173
  - http://localhost:8080
  - http://127.0.0.1:5173
  - http://127.0.0.1:8080
  cors_credentials: null
  allow_loopback_without_token: false
  max_ws_message_bytes: 262144
  max_chat_message_chars: 8000
  max_upload_bytes: 10485760
  session_max_age_seconds: 86400
  session_max_records: 200
  cookie_secure: null
  cookie_samesite: strict
  allow_admin_bearer_token: true
  export_allowed_dirs:
  - .task
  - .tmp_pytest
  - exports
  allow_audit_buffer_clear: false
  local_bypass_environments:
  - dev
  - test
  - local
  mcp:
    enabled: true
    rate_limit_requests: 120
    rate_limit_window_seconds: 60
    allow_tools: true
    allow_resources: true
    allow_prompts: true
    allowed_resource_prefixes: []
    allowed_prompt_names: []
