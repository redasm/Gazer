    - exec
    - read_file
    - write_file
    - edit_file
    - list_dir
    - find_files
    - git_status
    - read_skill
    - git_diff
    - git_commit
    - git_log
    - git_push
    - grep
    - git_branch
    desktop:
    - node_list
    - node_describe
    - node_invoke
    - gui_task_execute
    devices:
    - node_list
    - node_describe
    - node_invoke
    - gui_task_execute
    web:
    - web_search
    - web_fetch
    browser:
    - browser
    system:
    - get_time
    - image_analyze
    canvas:
    - a2ui_apply
    - canvas_snapshot
    - canvas_reset
    email:
    - email_list
    - email_read
    - email_send
    - email_search
    hardware:
    - hardware_control
    - vision_query
  auto_approve_privileged: false
  release_gate_enforcement: true
  release_gate_owner_bypass: false
  release_gate_auto_link_enabled: true
  coding_benchmark_auto_link_on_run: false
  coding_benchmark_scheduler:
    enabled: false
    interval_seconds: 1800
    auto_link_release_gate: true
    window: 20
    payload:
      name: scheduled_suite
      cases: []
  optimization_fail_streak_threshold: 2
  tool_circuit_breaker_enabled: true
  tool_circuit_breaker_failures: 3
  tool_circuit_breaker_cooldown_seconds: 30
  tool_budget_enabled: false
  tool_budget_window_seconds: 60
  tool_budget_max_calls: 120
  tool_budget_max_weight: 120.0
  tool_budget_max_calls_by_group: {}
  tool_budget_weight_by_group: {}
  tool_budget_weight_by_tool: {}
  rate_limit_requests: 30
  rate_limit_window: 60
scheduler:
  cron_enabled: true
  heartbeat_enabled: true
  heartbeat_interval: 300
hooks:
  enabled: true
  token: ''
sandbox:
  enabled: false
  image: python:3.11-slim
  workspace_mode: rw
agents:
  defaults:
    model:
      primary: dashscope/qwen-max
      fallbacks:
      - dashscope/qwen-turbo
    models:
      dashscope/qwen-max:
        alias: Qwen Max
      dashscope/qwen-turbo:
        alias: Qwen Turbo
    workspace: .
    compaction:
      mode: safeguard
    planning:
      mode: auto
      auto:
        min_message_chars: 220
        min_history_messages: 8
        min_line_breaks: 2
        min_list_lines: 2
    maxConcurrent: 4
    subagents:
      maxConcurrent: 8
  list:
  - id: mailbot
    name: Gmail Auto Reply
    workspace: .
    tool_policy:
      allow_groups:
      - email
  bindings:
  - agent_id: mailbot
    channel: webhook
    chat_id: event:gmail:main
    sender_id: hook:gmail
  orchestrator:
    max_parallel_tasks: 3
    max_parallel_per_agent: 2
    max_pending_tasks: 64
    resource_lock_timeout_seconds: 30.0
    sleep_wake:
      poll_interval_seconds: 1.0
      max_sleep_seconds: 3600.0
    sla:
      timeout_seconds: 120.0
      max_retries: 0
      retry_backoff_seconds: 0.0
      priority: normal
  templates:
    gmail_webhook_autoreply:
      agent:
        id: mailbot
        name: Gmail Auto Reply
        workspace: .
        tool_policy:
          allow_groups:
          - email
      binding:
        agent_id: mailbot
        channel: webhook
        chat_id: event:gmail:main
        sender_id: hook:gmail
      notes:
      - This template is a starting point; copy values into agents.list and agents.bindings.
      - Use email_send with reply_to=message_id from webhook metadata for threaded
        replies.
plugins:
  enabled: []
  disabled: []
  signature:
    enforce: false
    allow_unsigned: true
    trusted_keys: {}
skill_registry:
  registry_url: ''
skills:
  registry_url: ''
canvas:
