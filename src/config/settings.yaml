security:
  dm_policy: pairing
  owner_channel_ids: {}
  readonly_channel_ids: {}
  tool_max_tier: standard
  tool_denylist: []
  tool_allowlist: []
  max_tool_calls_per_turn: 12
  max_parallel_tool_calls: 4
  parallel_tool_lane_limits:
    io: 2
    device: 1
    network: 2
    default: 2
  tool_batching:
    enabled: true
    max_batch_size: 4
    dedupe_enabled: false
  tool_planner:
    enabled: true
    dependency_keys:
    - depends_on
    - dependsOn
    - after
    - requires
    - input_from
    - from_call_id
    - source_call_id
    - parent_call_id
    compact_results: true
    max_result_chars: 2400
    error_max_result_chars: 4000
    head_chars: 900
    tail_chars: 700
  tool_call_hooks:
    enabled: true
    loop_detection_enabled: true
    loop_max_repeats: 3
    loop_window_seconds: 90.0
    session_max_events: 256
  threat_scan:
    enabled: false
    provider: virustotal
    api_key: ''
    base_url: https://www.virustotal.com/api/v3
    request_timeout_seconds: 8.0
    max_files: 64
    fail_mode: open
  tool_groups:
    runtime:
    - delegate_task
    - cron
