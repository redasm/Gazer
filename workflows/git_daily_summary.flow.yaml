name: git_daily_summary
description: >
  Summarise recent git activity. Fetches the log for a repo, asks the LLM
  to produce a structured summary, then requires approval before sending
  the digest via email.

args:
  repo_path:
    type: string
    default: "."
  days:
    type: integer
    default: 1
  recipient:
    type: string
    default: ""

state:
  last_commit: null

config:
  timeout_ms: 120000
  max_output_bytes: 256000

steps:
  - id: fetch_log
    tool: run_command
    args:
      command: "git log --oneline --since='$args.days days ago'"
      cwd: "$args.repo_path"
    on_complete:
      last_commit: "steps['fetch_log'].output"

  - id: summarise
    tool: llm_task
    args:
      prompt: >
        Summarise the following git log into a concise daily digest.
        Group by theme (features, bugfixes, refactoring, docs).
        Return JSON with keys: themes (array of {name, commits[]}).
      input: "$steps.fetch_log.output"
      schema:
        type: object

  - id: review_gate
    approve:
      prompt: "Review the daily digest before sending."
      preview: "$steps.summarise.output"

  - id: send_email
    tool: send_email
    condition: "args.get('recipient', '') != ''"
    args:
      to: "$args.recipient"
      subject: "Git Daily Summary"
      body: "$steps.summarise.output"
