name: email_triage
description: >
  Triage inbox emails: fetch recent messages, categorise with LLM
  (urgent / normal / spam), draft replies for urgent ones, then
  require approval before sending.

args:
  max_emails:
    type: integer
    default: 10
  recipient_filter:
    type: string
    default: ""

state:
  last_id: null

config:
  timeout_ms: 120000
  max_output_bytes: 512000

steps:
  - id: fetch
    tool: email_list
    args:
      limit: "$args.max_emails"
      after_id: "$state.last_id"

  - id: categorize
    tool: llm_task
    args:
      prompt: >
        Categorize each email as urgent, normal, or spam.
        Return a JSON array of {id, subject, category, reason}.
      input: "$steps.fetch.output"
      schema:
        type: array

  - id: draft_replies
    tool: llm_task
    condition: "any(e.get('category') == 'urgent' for e in steps.get('categorize', {}).output or [] if isinstance(e, dict))"
    args:
      prompt: >
        Draft short, professional replies for the urgent emails below.
        Return JSON array of {to, subject, body}.
      input: "$steps.categorize.output"
      schema:
        type: array

  - id: review_gate
    condition: "'draft_replies' in steps and not steps['draft_replies'].skipped"
    approve:
      prompt: "Review and approve the drafted replies before sending."
      preview: "$steps.draft_replies.output"

  - id: send_replies
    condition: "'draft_replies' in steps and not steps['draft_replies'].skipped"
    tool: email_send
    each: "$steps.draft_replies.output"
    args:
      to: "$item.to"
      subject: "$item.subject"
      body: "$item.body"
    on_complete:
      last_id: "steps['fetch'].output[-1]['id'] if steps['fetch'].output else state.get('last_id')"
